<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - ForeSmart Investment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body {
            background: linear-gradient(145deg, #0a0e17 0%, #060a12 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 32px;
            padding: 40px;
            width: 420px;
            max-width: 90%;
            text-align: center;
        }
        .logo { margin-bottom: 30px; }
        .logo h1 { color: #10b981; font-size: 2rem; }
        .logo p { color: #8e9aaf; font-size: 0.8rem; margin-top: 5px; }
        input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            background: #1a2335;
            border: 1px solid #2d374b;
            border-radius: 48px;
            color: white;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #10b981;
            border: none;
            border-radius: 48px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .error { color: #ff5a67; margin-top: 15px; font-size: 0.85rem; }
        .note { color: #7e8aa2; font-size: 0.7rem; margin-top: 25px; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <h1>ForeSmart</h1>
        <p>منصة استثمار ذكية للعملاء المختارين</p>
    </div>
    <input type="text" id="inviteCode" placeholder="رمز الدعوة" dir="ltr">
    <button onclick="login()">دخول إلى المنصة</button>
    <div id="errorMsg" class="error"></div>
    <div class="note">⚠️ هذه المنصة متاحة فقط للعملاء المعتمدين. أدخل رمز الدعوة الخاص بك.</div>
</div>
<script>
    // قائمة العملاء المختارين (يمكن إضافتها/حذفها من لوحة الأدمن لاحقاً)
    const ALLOWED_CODES = {
        "VIP2025": { name: "مستثمر أول", type: "vip", role: "client" },
        "ANGEL01": { name: "مستثمر ملاك", type: "angel", role: "client" },
        "ADMIN999": { name: "مدير النظام", type: "admin", role: "admin" },
        "PARTNER01": { name: "شريك استراتيجي", type: "partner", role: "client" }
    };
    function login() {
        const code = document.getElementById('inviteCode').value.trim();
        const user = ALLOWED_CODES[code];
        if (user) {
            localStorage.setItem('fs_user', JSON.stringify({ code, name: user.name, role: user.role }));
            if (user.role === 'admin') window.location.href = 'admin.html';
            else window.location.href = 'index.html';
        } else {
            document.getElementById('errorMsg').innerText = '❌ رمز الدعوة غير صالح. هذه المنصة للعملاء المختارين فقط.';
        }
    }
</script>
</body>
</html>
