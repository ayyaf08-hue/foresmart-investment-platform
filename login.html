<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - ForeSmart Investment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, 'Cairo', sans-serif; }
        body {
            background: linear-gradient(145deg, #0a0e17 0%, #060a12 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 32px;
            padding: 40px;
            width: 480px;
            max-width: 100%;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #10b981; font-size: 2rem; }
        .logo p { color: #8e9aaf; font-size: 0.8rem; margin-top: 5px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 40px; transition: 0.2s; }
        .tab.active { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .form-group { margin-bottom: 20px; }
        input, select {
            width: 100%;
            padding: 14px 18px;
            background: #1a2335;
            border: 1px solid #2d374b;
            border-radius: 48px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #10b981;
            border: none;
            border-radius: 48px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .error { color: #ff5a67; margin-top: 15px; font-size: 0.85rem; text-align: center; }
        .info { color: #7e8aa2; font-size: 0.7rem; margin-top: 20px; text-align: center; }
        .trial-note { background: rgba(16,185,129,0.1); border-radius: 20px; padding: 15px; margin-top: 20px; text-align: center; font-size: 0.8rem; }
        .trial-note strong { color: #10b981; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <h1>ForeSmart</h1>
        <p>منصة الاستثمار الذكية</p>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="showTab('login')">تسجيل الدخول</div>
        <div class="tab" onclick="showTab('register')">إنشاء حساب جديد</div>
    </div>
    
    <!-- نموذج تسجيل الدخول -->
    <div id="loginForm">
        <div class="form-group"><input type="email" id="loginEmail" placeholder="البريد الإلكتروني" dir="ltr"></div>
        <div class="form-group"><input type="password" id="loginPassword" placeholder="كلمة المرور" dir="ltr"></div>
        <button onclick="handleLogin()">دخول إلى المنصة</button>
        <div id="loginError" class="error"></div>
    </div>
    
    <!-- نموذج إنشاء حساب جديد -->
    <div id="registerForm" style="display: none;">
        <div class="form-group"><input type="text" id="regName" placeholder="الاسم الكامل"></div>
        <div class="form-group"><input type="email" id="regEmail" placeholder="البريد الإلكتروني" dir="ltr"></div>
        <div class="form-group"><input type="password" id="regPassword" placeholder="كلمة المرور" dir="ltr"></div>
        <div class="form-group"><input type="password" id="regConfirm" placeholder="تأكيد كلمة المرور" dir="ltr"></div>
        <button onclick="handleRegister()">إنشاء حساب - 14 يوم تجريبي مجاني</button>
        <div id="registerError" class="error"></div>
    </div>
    
    <div class="trial-note">
        🎉 <strong>فترة تجريبية مجانية لمدة 14 يوم</strong><br>
        يمكنك تجربة المنصة بكامل ميزاتها، ثم الاشتراك في الباقة التي تناسبك.
    </div>
    <div class="info">🔐 هذه المنصة للعملاء المعتمدين فقط</div>
</div>

<script src="assets/plans.js"></script>
<script src="assets/auth.js"></script>
<script>
    function showTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if (tab === 'login') {
            document.querySelector('.tab:first-child').classList.add('active');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        } else {
            document.querySelector('.tab:last-child').classList.add('active');
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
    }
    
    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const result = login(email, password);
        if (result.success) {
            window.location.href = result.user.role === 'admin' ? 'admin.html' : 'index.html';
        } else {
            document.getElementById('loginError').innerText = result.error;
        }
    }
    
    function handleRegister() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        
        if (!name || !email || !password) {
            document.getElementById('registerError').innerText = 'جميع الحقول مطلوبة';
            return;
        }
        if (password !== confirm) {
            document.getElementById('registerError').innerText = 'كلمة المرور غير متطابقة';
            return;
        }
        if (password.length < 6) {
            document.getElementById('registerError').innerText = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
            return;
        }
        
        const result = register(email, password, name);
        if (result.success) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('registerError').innerText = result.error;
        }
    }
</script>
</body>
</html>
