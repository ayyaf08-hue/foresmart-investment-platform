<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForeSmart Investment - لوحة التحكم</title>

    <!-- Google Fonts -->
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap)" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: #f5f6fa;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #1e1e2f;
            color: white;
            height: 100vh;
            position: fixed;
            padding-top: 30px;
        }
        .sidebar h2 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 22px;
        }
        .menu a {
            display: block;
            padding: 14px 25px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 5px;
            border-right: 3px solid transparent;
            transition: 0.2s;
        }
        .menu a:hover {
            background: #2d2d44;
            border-right: 3px solid #10b981;
        }

        /* Main Area */
        .main {
            margin-right: 250px;
            padding: 25px;
        }

        /* Header */
        .topbar {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar h1 {
            margin: 0;
            font-size: 26px;
            color: #333;
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.08);
        }
        .card h3 {
            margin: 0;
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .card .value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #10b981;
        }

        /* Chart Container */
        .chart-box {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.08);
            margin-top: 30px;
        }
        .chart-box h2 {
            margin-bottom: 20px;
            color: #333;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>ForeSmart</h2>
        <div class="menu">
            <a href="#">لوحة التحكم</a>
            <a href="#">محفظتي</a>
            <a href="#">الصفقات</a>
            <a href="#">الاشتراكات</a>
            <a href="#">الإيداع والسحب</a>
            <a href="#">الإعدادات</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Topbar -->
        <div class="topbar">
            <h1>لوحة التحكم الرئيسية</h1>
            <span style="font-size: 16px; color: #555;">مرحباً بك 👋</span>
        </div>

        <!-- Stats Cards -->
        <div class="cards">
            <div class="card">
                <h3>الرصيد الكلي</h3>
                <div class="value">12,450 ريال</div>
            </div>

            <div class="card">
                <h3>أرباح اليوم</h3>
                <div class="value" style="color:#3b82f6;">+2.5%</div>
            </div>

            <div class="card">
                <h3>عدد الصفقات</h3>
                <div class="value">15</div>
            </div>

            <div class="card">
                <h3>الاشتراك الحالي</h3>
                <div class="value" style="color:#f59e0b;">PRO</div>
            </div>
        </div>

        <!-- Chart Box -->
        <div class="chart-box">
            <h2>أداء المحفظة</h2>
            <canvas id="myChart"></canvas>
        </div>

    </div>

    <!-- Chart.js Library -->
    <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/chart.js)"></script>

    <!-- Chart Script -->
    <script>
        const ctx = document.getElementById('myChart');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['السبت','الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'],
                datasets: [{
                    label: 'الأرباح الأسبوعية',
                    data: [5, 8, 6, 10, 9, 13, 15],
                    borderWidth: 3,
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16,185,129,0.2)',
                    tension: 0.4,
                    fill: true
                }]
            }
        });
    </script>

</body>
</html>
