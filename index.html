<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForeSmart - منصة الاستثمار الذكية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0a0e17; color: #eef2ff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .logo h1 { color: #10b981; font-size: 1.8rem; }
        .logo p { font-size: 0.8rem; color: #7c88a8; }
        .market-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; background: #0f1420; padding: 15px 20px; border-radius: 16px; }
        .market-btn { background: #1a2335; border: none; padding: 10px 20px; border-radius: 30px; color: #b9c3e0; cursor: pointer; transition: 0.2s; }
        .market-btn:hover, .market-btn.active { background: #10b981; color: white; }
        .status { background: #0f1420; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem; }
        .status.error { color: #ff5a67; }
        .status.success { color: #10b981; }
        .table-container { overflow-x: auto; background: #0f1420; border-radius: 20px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: right; border-bottom: 1px solid #1f2a3e; }
        th { color: #10b981; font-weight: bold; }
        .positive { color: #10b981; }
        .negative { color: #ff5a67; }
        .rec-buy { background: rgba(16,185,129,0.2); color: #10b981; padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .rec-sell { background: rgba(255,90,103,0.2); color: #ff5a67; padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .rec-hold { background: rgba(246,184,75,0.2); color: #f6b84b; padding: 4px 12px; border-radius: 20px; display: inline-block; }
        .trade-btn { background: #10b981; border: none; padding: 6px 15px; border-radius: 20px; color: white; cursor: pointer; }
        .analysis-btn { background: #3b82f6; border: none; padding: 6px 15px; border-radius: 20px; color: white; cursor: pointer; margin-left: 5px; }
        .count-badge { background: #10b98120; padding: 5px 12px; border-radius: 30px; font-size: 0.8rem; display: inline-block; margin-right: 10px; }
        @media (max-width: 768px) { th, td { padding: 8px 6px; font-size: 0.75rem; } .market-btn { padding: 6px 12px; font-size: 0.8rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1>ForeSmart</h1><p>منصة الاستثمار الذكية - جميع أسواق العالم</p></div>
        <div id="userInfo">👋 مرحباً بك</div>
    </div>

    <div id="statusArea" class="status">⏳ جاري تحميل بيانات الأسواق...</div>
    <div class="market-buttons" id="marketButtons"></div>
    <div id="tableArea"></div>
</div>

<script>
    const API_BASE = "https://foresmart-intelligence-backend-production.up.railway.app";
    let currentMarket = 'us';

    const markets = [
        { id: 'us', name: '🇺🇸 السوق الأمريكي', count: 0 },
        { id: 'saudi', name: '🇸🇦 السوق السعودي', count: 0 },
        { id: 'uk', name: '🇬🇧 السوق البريطاني', count: 0 },
        { id: 'uae', name: '🇦🇪 السوق الإماراتي', count: 0 },
        { id: 'china', name: '🇨🇳 السوق الصيني', count: 0 },
        { id: 'europe', name: '🇪🇺 السوق الأوروبي', count: 0 },
        { id: 'japan', name: '🇯🇵 السوق الياباني', count: 0 },
        { id: 'crypto', name: '₿ العملات الرقمية', count: 0 },
        { id: 'metals', name: '🥇 المعادن', count: 0 },
        { id: 'bonds', name: '📜 السندات', count: 0 }
    ];

    async function testBackendConnection() {
        const statusDiv = document.getElementById('statusArea');
        try {
            const res = await fetch(`${API_BASE}/api/markets/us`);
            if (res.ok) {
                statusDiv.innerHTML = '✅ متصل بالـ Backend بنجاح';
                statusDiv.className = 'status success';
                return true;
            } else {
                throw new Error('استجابة غير صالحة');
            }
        } catch (error) {
            statusDiv.innerHTML = `❌ فشل الاتصال بـ Backend: ${error.message}. تأكد من أن Railway يعمل. الرابط: ${API_BASE}`;
            statusDiv.className = 'status error';
            return false;
        }
    }

    async function loadMarketData() {
        const tableArea = document.getElementById('tableArea');
        tableArea.innerHTML = '<div class="status">⏳ جاري تحميل بيانات السوق...</div>';
        
        try {
            const response = await fetch(`${API_BASE}/api/markets/${currentMarket}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const companies = data.data;
            
            if (!companies || companies.length === 0) {
                tableArea.innerHTML = '<div class="status error">⚠️ لا توجد بيانات متاحة لهذا السوق</div>';
                return;
            }
            
            let tableHtml = `<div class="table-container"><table><thead><tr>
                <th>الشركة</th><th>القطاع</th><th>السعر</th><th>التغير</th><th>التوصية</th><th>تحليل ذكي</th><th>تداول</th>
            </tr></thead><tbody>`;
            
            companies.forEach(comp => {
                const change = comp.change24h || comp.change || (Math.random() * 6 - 3).toFixed(1);
                const changeNum = parseFloat(change);
                const changeClass = changeNum >= 0 ? 'positive' : 'negative';
                const changeSymbol = changeNum >= 0 ? '▲' : '▼';
                
                let rec = 'احتفاظ', recClass = 'rec-hold';
                if (comp.recommendation === 'buy' || (changeNum > 5)) { rec = 'شراء'; recClass = 'rec-buy'; }
                else if (comp.recommendation === 'sell' || (changeNum < -3)) { rec = 'بيع'; recClass = 'rec-sell'; }
                
                const priceDisplay = typeof comp.price === 'number' ? comp.price.toLocaleString() : comp.price;
                const currency = (currentMarket === 'crypto' || currentMarket === 'metals') ? '$' : (currentMarket === 'saudi' ? 'ريال' : '');
                
                tableHtml += `<tr>
                    <td><strong>${comp.name}</strong><br><span style="font-size:0.7rem;color:#8e9aaf;">${comp.symbol || comp.name.substring(0,4)}</span></td>
                    <td>${comp.sector || '—'}</td>
                    <td>${priceDisplay} ${currency}</td>
                    <td class="${changeClass}">${changeSymbol} ${Math.abs(changeNum).toFixed(2)}%</td>
                    <td><span class="${recClass}">${rec}</span></td>
                    <td><button class="analysis-btn" onclick="alert('تحليل AI لـ ${comp.name}: المؤشرات تشير إلى اتجاه ${changeNum >= 0 ? 'إيجابي' : 'سلبي'}. يوصى ${rec}.')">تحليل</button></td>
                    <td><button class="trade-btn" onclick="alert('فتح نافذة تداول لـ ${comp.name} (قريباً)')">تداول</button></td>
                </tr>`;
            });
            
            tableHtml += `</tbody></table></div><div style="margin-top:15px;text-align:center;font-size:0.8rem;color:#5f6e8c;">📊 عدد الشركات المعروضة: ${companies.length}</div>`;
            tableArea.innerHTML = tableHtml;
            
            // تحديث عدد الشركات في الأزرار
            const marketIndex = markets.findIndex(m => m.id === currentMarket);
            if (marketIndex !== -1) markets[marketIndex].count = companies.length;
            renderMarketButtons();
            
        } catch (error) {
            tableArea.innerHTML = `<div class="status error">❌ خطأ في تحميل البيانات: ${error.message}<br>تأكد من أن الرابط يعمل: ${API_BASE}/api/markets/${currentMarket}</div>`;
        }
    }

    function renderMarketButtons() {
        const container = document.getElementById('marketButtons');
        container.innerHTML = markets.map(m => `<button class="market-btn ${m.id === currentMarket ? 'active' : ''}" data-market="${m.id}">${m.name} <span class="count-badge">${m.count || 0}</span></button>`).join('');
        
        document.querySelectorAll('.market-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentMarket = btn.dataset.market;
                renderMarketButtons();
                loadMarketData();
            });
        });
    }

    async function init() {
        const isConnected = await testBackendConnection();
        if (isConnected) {
            renderMarketButtons();
            loadMarketData();
        }
    }
    
    init();
</script>
</body>
</html>
