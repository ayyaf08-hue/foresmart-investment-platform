<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - ForeSmart Investment</title>

    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap)" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0b0b0d;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .register-box {
            background: #111;
            padding: 40px;
            width: 380px;
            border-radius: 18px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        .register-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #10b981;
        }

        .input-field {
            margin-bottom: 18px;
        }

        .input-field label {
            color: #ccc;
            margin-bottom: 6px;
            display: block;
        }

        .input-field input {
            width: 100%;
            padding: 14px;
            background: #1a1a1d;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            background: #10b981;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        .register-btn:hover {
            background: #0f9a70;
        }

        .extra {
            text-align: center;
            margin-top: 15px;
        }

        .extra a {
            color: #3b82f6;
        }
    </style>
</head>

<body>

    <div class="register-box">
        <h2>إنشاء حساب جديد</h2>

        <form action="login.html">

            <div class="input-field">
                <label>الاسم الكامل</label>
                <input type="text" required>
            </div>

            <div class="input-field">
                <label>البريد الإلكتروني</label>
                <input type="email" required>
            </div>

            <div class="input-field">
                <label>رقم الجوال</label>
                <input type="text" required>
            </div>

            <div class="input-field">
                <label>كلمة المرور</label>
                <input type="password" required>
            </div>

            <button class="register-btn">إنشاء حساب</button>

            <div class="extra">
                لديك حساب؟ <a href="login.html">تسجيل الدخول</a>
            </div>

        </form>
    </div>

</body>
</html>
