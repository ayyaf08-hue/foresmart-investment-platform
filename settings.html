<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - ForeSmart</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">

    <style>
        .settings-box {
            margin-top:40px;
            background:#0f0f0f;
            padding:25px;
            border-radius:16px;
        }
        .settings-box h2 {
            margin-bottom:20px;
        }
        .input-field {
            margin-bottom:18px;
        }
        .input-field input {
            width:100%;
            padding:12px;
            background:#1b1b1b;
            border:none;
            border-radius:10px;
            color:white;
        }
        .save-btn {
            background:#10b981;
            padding:14px;
            width:100%;
            border:none;
            border-radius:10px;
            color:white;
            cursor:pointer;
        }
    </style>

</head>

<body>

    <div class="sidebar">
        <h2 class="logo">ForeSmart</h2>
        <ul>
            <li><a href="index.html">لوحة التحكم</a></li>
            <li><a href="trades.html">الصفقات</a></li>
            <li><a href="subscriptions.html">الاشتراكات</a></li>
            <li><a href="wallet.html">الإيداع والسحب</a></li>
            <li class="active"><a href="settings.html">الإعدادات</a></li>
            <li><a href="login.html">تسجيل الخروج</a></li>
        </ul>
    </div>

    <div class="main">

        <div class="topbar">
            <h1>إعدادات الحساب</h1>
        </div>

        <div class="settings-box">

            <h2>المعلومات الشخصية</h2>

            <div class="input-field">
                <label>الاسم الكامل</label>
                <input type="text">
            </div>

            <div class="input-field">
                <label>البريد الإلكتروني</label>
                <input type="email">
            </div>

            <div class="input-field">
                <label>رقم الجوال</label>
                <input type="text">
            </div>

            <h2 style="margin-top:30px;">تغيير كلمة المرور</h2>

            <div class="input-field">
                <label>كلمة المرور الحالية</label>
                <input type="password">
            </div>

            <div class="input-field">
                <label>كلمة المرور الجديدة</label>
                <input type="password">
            </div>

            <button class="save-btn">حفظ التغييرات</button>

        </div>

    </div>

</body>
</html>
