<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإيداع والسحب - ForeSmart</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">

    <style>
        .wallet-box {
            background:#0f0f0f;
            padding:30px;
            border-radius:16px;
            margin-top:40px;
        }

        .wallet-box h2 {
            margin-bottom:20px;
        }

        .input-field {
            margin-bottom:20px;
        }

        .input-field label {
            display:block;
            margin-bottom:6px;
        }

        .input-field input {
            width:100%;
            padding:12px;
            border-radius:10px;
            border:none;
            background:#1d1d1d;
            color:white;
        }

        .pay-btn {
            width:100%;
            padding:14px;
            background:#10b981;
            border:none;
            border-radius:10px;
            margin-top:10px;
            font-size:18px;
            cursor:pointer;
        }

        .methods {
            display:grid;
            grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-top:25px;
        }

        .method-card {
            background:#000;
            padding:18px;
            border-radius:14px;
            text-align:center;
            border:1px solid #222;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2 class="logo">ForeSmart</h2>
        <ul>
            <li><a href="index.html">لوحة التحكم</a></li>
            <li><a href="trades.html">الصفقات</a></li>
            <li><a href="subscriptions.html">الاشتراكات</a></li>
            <li class="active"><a href="wallet.html">الإيداع والسحب</a></li>
            <li><a href="settings.html">الإعدادات</a></li>
            <li><a href="login.html">تسجيل الخروج</a></li>
        </ul>
    </div>

    <div class="main">

        <div class="topbar">
            <h1>الإيداع والسحب</h1>
        </div>

        <div class="wallet-box">
            <h2>اختر طريقة الدفع</h2>

            <div class="methods">

                <div class="method-card">
                    <img src="[seeklogo.com](https://seeklogo.com/images/S/stcpay-logo-27CC73DE61-seeklogo.com.png)" width="80">
                    <p>STC Pay</p>
                </div>

                <div class="method-card">
                    <img src="[upload.wikimedia.org](https://upload.wikimedia.org/wikipedia/commons/0/04/Mada_Logo.png)" width="80">
                    <p>مدى</p>
                </div>

                <div class="method-card">
                    <img src="[i.imgur.com](https://i.imgur.com/o5uMf1f.png)" width="80">
                    <p>تحويل بنكي محلي</p>
                </div>

            </div>

            <br><br>

            <h2>طلب تحويل</h2>

            <div class="input-field">
                <label>المبلغ (ريال)</label>
                <input type="number">
            </div>

            <div class="input-field">
                <label>تفاصيل الطلب</label>
                <input type="text">
            </div>

            <button class="pay-btn">إرسال الطلب</button>

        </div>

    </div>

</body>
</html>
